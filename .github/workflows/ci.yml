# ══════════════════════════════════════════════════════════
# CI — Senlis Participatif
# Lint + tests sur chaque push et PR.
# CI verte = condition de merge (protection de branche).
# ══════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── API ──────────────────────────────────────────────
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: senlis
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: senlis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U senlis"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://senlis:test_password@localhost:5432/senlis_test
      JWT_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test

  # ── Client ───────────────────────────────────────────
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
